<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Page</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --ink: #1a1208;
      --accent: #c84b1f;
      --muted: #8a7e6e;
      --card: #fffdf7;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
      animation: rise 0.8s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 1.4rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn:hover { opacity: 0.88; transform: translateY(-2px); }

    .divider {
      width: 40px;
      height: 3px;
      background: var(--accent);
      margin: 2.5rem auto;
      border-radius: 2px;
    }

    .card {
      background: var(--card);
      border: 1px solid #e5ddd0;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: left;
    }

    .card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      margin-bottom: 0.6rem;
    }

    .card p { margin-bottom: 0; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">Hello, World</span>
    <h1>A Simple HTML Page</h1>
    <p>Clean, readable, and ready to build on. This is your starting point — everything you need and nothing you don't.</p>
    <a href="#" class="btn">Get Started</a>

    <div class="divider"></div>

    <div class="card">
      <h2>About This Page</h2>
      <p>A minimal HTML template with good typography, a warm color palette, and a smooth load animation. Copy, modify, and make it yours.</p>
    </div>
  </div>
</body>
</html>
